<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="TTT.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500&family=Poppins:wght@300;500;600&display=swap"
    rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Kanit:wght@900&family=Oswald:wght@500&family=Poppins:wght@300;500;600&display=swap"
    rel="stylesheet">
</head>

<body>
  <header>
    <nav class="navbar">
      <span>TicTacToe</span>
    </nav>
  </header>
  <main>
    <div class="gameContainer">
      <div class="firstRow row">
        <div class="box b1"><span class="boxText"></span></div>
        <div class="box b2"><span class="boxText"></span></div>
        <div class="box b3"><span class="boxText"></span></div>
      </div>
      <div class="secondRow row">
        <div class="box b4"><span class="boxText"></span></div>
        <div class="box b5"><span class="boxText"></span></div>
        <div class="box b6"><span class="boxText"></span></div>
      </div>
      <div class="thirdRow row">
        <div class="box b7"><span class="boxText"></span></div>
        <div class="box b8"><span class="boxText"></span></div>
        <div class="box b9"><span class="boxText"></span></div>
      </div>
    </div>
  </main>
  <script src="ttt.js"></script>
</body>

</html>
